[tool.ruff]
line-length = 88
target-version = "py312"

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
    "UP",
]

ignore = []

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.14"

strict = true

warn_unused_configs = true

warn_return_any = true

warn_unused_ignores = true

show_error_codes = true

ignore_missing_imports = true